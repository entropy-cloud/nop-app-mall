type: page
title: 经营看板
body:
  - type: form
    title: 看板筛选
    mode: inline
    wrapWithPanel: false
    body:
      - type: select
        name: granularity
        label: 趋势粒度
        value: day
        options:
          - label: 按小时
            value: hour
          - label: 按天
            value: day
          - label: 按周
            value: week
          - label: 按月
            value: month
      - type: input-date-range
        name: dateRange
        label: 趋势范围
        format: X
      - type: button
        label: 刷新
        level: primary
        actionType: reload
        target: metrics,salesTrend,realtimeOrders,todo

  # 核心指标卡
  - type: service
    name: metrics
    api:
      url: '@query:LitemallOrder__getDashboardMetrics'
      data: {}
      sendOn: true
    body:
      - type: grid
        columns:
          - md: 2
            body:
              - type: panel
                title: 今日 GMV（¥）
                body:
                  - type: tpl
                    tpl: '<b style="font-size:24px">${todayGmv || 0}</b>'
                  - type: tpl
                    tpl: '日环比：${gmvDayRatio != null ? (gmvDayRatio >= 0 ? "▲" : "▼") + (Math.abs(gmvDayRatio) * 100).toFixed(1) + "%" : "--"} | 周同比：${gmvWeekRatio != null ? (gmvWeekRatio >= 0 ? "▲" : "▼") + (Math.abs(gmvWeekRatio) * 100).toFixed(1) + "%" : "--"}'
          - md: 2
            body:
              - type: panel
                title: 今日订单数
                body:
                  - type: tpl
                    tpl: '<b style="font-size:24px">${orderCount || 0}</b>'
          - md: 2
            body:
              - type: panel
                title: UV（登录用户）
                body:
                  - type: tpl
                    tpl: '<b style="font-size:24px">${uv || 0}</b>'
          - md: 2
            body:
              - type: panel
                title: 转化率
                body:
                  - type: tpl
                    tpl: '<b style="font-size:24px">${((conversionRate || 0) * 100).toFixed(2)}%</b>'
          - md: 2
            body:
              - type: panel
                title: 客单价（¥）
                body:
                  - type: tpl
                    tpl: '<b style="font-size:24px">${aov || 0}</b>'
          - md: 2
            body:
              - type: panel
                title: 退货率
                body:
                  - type: tpl
                    tpl: '<b style="font-size:24px">${((returnRate || 0) * 100).toFixed(2)}%</b>'

  # 销售趋势图
  - type: service
    name: salesTrend
    api:
      url: '@query:LitemallOrder__getSalesTrend'
      data:
        granularity: ${granularity}
        startDate: "${dateRange ? (dateRange[0] ? dateRange[0] | date : '') : ''}"
        endDate: "${dateRange ? (dateRange[1] ? dateRange[1] | date : '') : ''}"
      sendOn: true
    body:
      - type: panel
        title: 销售趋势
        body:
          - type: chart
            config:
              tooltip:
                trigger: axis
              legend:
                data: [GMV, 订单数]
              dataset:
                source: ${data}
              xAxis:
                type: category
              yAxis:
                - type: value
                  name: GMV(¥)
                - type: value
                  name: 订单数
              series:
                - type: line
                  name: GMV
                  encode:
                    x: dateLabel
                    y: gmv
                - type: bar
                  name: 订单数
                  yAxisIndex: 1
                  encode:
                    x: dateLabel
                    y: orderCount

  # 实时订单流 + 待办聚合
  - type: grid
    columns:
      - md: 7
        body:
          - type: service
            name: realtimeOrders
            api:
              url: '@query:LitemallOrder__getRealtimeOrders'
              data:
                limit: 20
              sendOn: true
            body:
              - type: panel
                title: 实时订单流
                body:
                  - type: table
                    source: ${data}
                    columns:
                      - name: orderSn
                        label: 订单号
                      - name: userId
                        label: 用户ID
                      - name: orderStatus
                        label: 状态
                      - name: addTime
                        label: 下单时间
      - md: 5
        body:
          - type: service
            name: todo
            api:
              url: '@query:LitemallOrder__getTodoAggregation'
              data: {}
              sendOn: true
            body:
              - type: panel
                title: 待办聚合
                body:
                  - type: grid
                    columns:
                      - md: 6
                        body:
                          - type: tpl
                            tpl: '待发货：<b style="color:#dc3545">${pendingShip || 0}</b>'
                      - md: 6
                        body:
                          - type: tpl
                            tpl: '待退款：<b style="color:#dc3545">${pendingRefund || 0}</b>'
                      - md: 6
                        body:
                          - type: tpl
                            tpl: '售后待审核：<b style="color:#dc3545">${aftersalePendingReview || 0}</b>'
                      - md: 6
                        body:
                          - type: tpl
                            tpl: '库存预警：<b style="color:#dc3545">${stockWarning || 0}</b>'
                  - type: divider
                  - type: tpl
                    tpl: '<b>库存预警明细</b>'
                  - type: table
                    source: ${stockWarningDetails}
                    columns:
                      - name: goodsName
                        label: 商品
                      - name: totalStock
                        label: 聚合库存
                      - name: safetyStock
                        label: 商品安全库存
                      - name: thresholdSource
                        label: 阈值来源
                        type: mapping
                        map:
                          safetyStock: '<span class="label label-success">商品级</span>'
                          global: '<span class="label label-warning">全局回退</span>'
