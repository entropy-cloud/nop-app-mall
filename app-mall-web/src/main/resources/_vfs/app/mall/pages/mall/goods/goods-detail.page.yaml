type: page
title: 商品详情
body:
  - type: wrapper
    className: storefront-header
    body:
      type: flex
      justify: space-between
      alignItems: center
      style:
        padding: 10px 20px
        backgroundColor: '#fff'
        borderBottom: 2px solid '#ff6700'
      items:
        - type: wrapper
          body:
            - type: button
              label: '<b style="font-size:24px;color:#ff6700">商城</b>'
              level: link
              actionType: link
              link: "/storefront-home"
        - type: wrapper
          body:
            - type: button
              label: 购物车
              icon: shopping-cart
              level: link
              actionType: link
              link: "/storefront-cart"
            - type: button
              label: 用户中心
              icon: user
              level: link
              actionType: link
              link: "/storefront-user-center"

  - type: service
    name: goodsDetail
    api:
      url: '@query:LitemallGoods__frontDetail?id=${id}'
      sendOn: "${id}"
    body:
      - type: grid
        columns:
          - md: 5
            body:
              type: wrapper
              style:
                padding: 20px
              body:
                type: tpl
                tpl: '<img src="${data.picUrl}" style="width:100%;border-radius:4px"/>'
          - md: 7
            body:
              type: wrapper
              style:
                padding: 20px
              body:
                - type: tpl
                  tpl: '<h2>${data.name}</h2>'
                - type: tpl
                  tpl: '<p style="color:#999">${data.brief}</p>'
                - type: divider
                - type: tpl
                  tpl: '<div style="background:#fff8f0;padding:15px;border-radius:4px;margin:10px 0"><span style="color:#999">价格：</span><span style="color:#ff6700;font-size:28px;font-weight:bold">¥${data.retailPrice}</span></div>'
                - type: tpl
                  tpl: '<div style="margin:5px 0"><span style="color:#999">专柜价：</span><span style="text-decoration:line-through;color:#999">¥${data.counterPrice}</span></div>'

                # P24 flash sale banner: shows when goods has an ACTIVE flash sale with an
                # in-progress session. Banner shows flash price + countdown + buy button.
                # Calls flashSaleForGoods which returns null when no active session → hidden.
                - type: service
                  name: flashSale
                  api:
                    url: '@query:LitemallFlashSale__flashSaleForGoods'
                    data:
                      goodsId: "${id}"
                      productId: "${productId}"
                    sendOn: "${id != null}"
                  body:
                    - type: tpl
                      visibleOn: "${flashSale.data != null}"
                      tpl: '<div style="background:linear-gradient(90deg,#ff4500,#ff6347);padding:12px 15px;border-radius:4px;margin:5px 0;border:1px solid #ff4500"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="background:#fff;color:#ff4500;font-size:12px;padding:2px 8px;border-radius:3px;font-weight:bold">秒杀</span><span style="color:#fff;font-size:28px;font-weight:bold">¥${flashSale.data.flashPrice}</span><span style="color:rgba(255,255,255,0.8);font-size:12px">每单限购 ${flashSale.data.maxPerOrder} 件</span></div><div style="margin-top:6px;color:#fff;font-size:13px">距场次结束：<b>${flashSale.data.sessionEnd}</b></div><div visibleOn="${flashSale.data.sessionStock > 0}" style="margin-top:4px;color:rgba(255,255,255,0.9);font-size:12px">剩余 ${flashSale.data.sessionStock} 件</div></div>'
                    - type: button
                      visibleOn: "${flashSale.data != null}"
                      label: 立即抢购
                      level: danger
                      size: lg
                      actionType: dialog
                      dialog:
                        title: 秒杀下单
                        body:
                          type: form
                          api:
                            url: '@mutation:LitemallFlashSale__flashSaleBuy'
                            data:
                              flashSaleSessionId: '${flashSale.data.liveSessionId}'
                              addressId: '${addressId}'
                              productId: "${productId}"
                              number: '${number}'
                          body:
                            - type: select
                              name: addressId
                              label: 收货地址
                              required: true
                              source:
                                url: '@query:LitemallAddress__findList'
                                valueField: id
                                labelField: name
                            - type: input-number
                              name: number
                              label: 购买数量
                              value: 1
                              min: 1
                              max: '${flashSale.data.maxPerOrder}'
                            - type: tpl
                              tpl: '<div style="color:#999;font-size:12px">秒杀价：¥${flashSale.data.flashPrice}/件，不支持优惠券、不与其他促销叠加</div>'

                # P25 pin-tuan entry: shows when goods has an ACTIVE pin-tuan activity.
                # Calls pinTuanForGoods which returns null when no active activity → hidden.
                - type: service
                  name: pinTuan
                  api:
                    url: '@query:LitemallPinTuanActivity__pinTuanForGoods'
                    data:
                      goodsId: "${id}"
                    sendOn: "${id != null}"
                  body:
                    - type: tpl
                      visibleOn: "${pinTuan.data != null}"
                      tpl: '<div style="background:linear-gradient(90deg,#e91e63,#f06292);padding:12px 15px;border-radius:4px;margin:5px 0;border:1px solid #e91e63"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="background:#fff;color:#e91e63;font-size:12px;padding:2px 8px;border-radius:3px;font-weight:bold">拼团</span><span style="color:#fff;font-size:28px;font-weight:bold">¥${pinTuan.data.pinTuanPrice}</span><span style="color:rgba(255,255,255,0.8);font-size:12px">${pinTuan.data.minUserCount} 人成团</span></div><div style="margin-top:6px;color:#fff;font-size:13px">拼团专享价，邀好友一起拼更优惠（有效 ${pinTuan.data.expireHours} 小时）</div></div>'
                    - type: button
                      visibleOn: "${pinTuan.data != null}"
                      label: 发起拼团
                      level: primary
                      size: lg
                      actionType: dialog
                      dialog:
                        title: 拼团下单
                        body:
                          type: form
                          api:
                            url: '@mutation:LitemallOrder__submit'
                            data:
                              addressId: '${addressId}'
                              freightPrice: 0
                              pinTuanActivityId: '${pinTuan.data.id}'
                          body:
                            - type: select
                              name: addressId
                              label: 收货地址
                              required: true
                              source:
                                url: '@query:LitemallAddress__findList'
                                valueField: id
                                labelField: name
                            - type: tpl
                              tpl: '<div style="color:#999;font-size:12px">拼团价：¥${pinTuan.data.pinTuanPrice}/件，发起拼团后邀请好友参团</div>'
                      messages:
                        success: '拼团已发起，快去邀请好友参团吧'

                - type: service
                  name: promotionSummary
                  api:
                    url: '@query:LitemallPromotionActivity__selectPromotionForOrder'
                    data:
                      goodsPrice: "${data.retailPrice}"
                      goodsScopeIds:
                        - "${id}"
                    sendOn: "${id != null && data != null}"
                  body:
                    type: tpl
                    visibleOn: "${promotionSummary.data > 0}"
                    tpl: '<div style="background:#fff0e0;padding:8px 15px;border-radius:4px;margin:5px 0"><span style="color:#ff6700">满减优惠</span>：本商品参与满减，单件最高可减 <b style="color:#ff6700">¥${promotionSummary.data}</b>（满减自动生效，最终优惠以下单结算为准）</div>'

                - type: service
                  name: timeDiscount
                  api:
                    url: '@query:LitemallTimeDiscount__selectTimeDiscountForProduct'
                    data:
                      goodsId: "${id}"
                      productId: "${productId}"
                    sendOn: "${id != null}"
                  body:
                    - type: tpl
                      visibleOn: "${timeDiscount.data != null}"
                      tpl: '<div style="background:linear-gradient(90deg,#fff0e0,#ffe4c4);padding:12px 15px;border-radius:4px;margin:5px 0;border:1px solid #ffb74d"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="background:#ff4500;color:#fff;font-size:12px;padding:2px 8px;border-radius:3px;font-weight:bold">限时折扣</span><span style="text-decoration:line-through;color:#999">¥${timeDiscount.data.originalPrice}</span><span style="color:#ff6700;font-size:24px;font-weight:bold">¥${timeDiscount.data.promoPrice}</span><span style="color:#ff6700">直降 ¥${timeDiscount.data.discountAmount}</span></div><div style="margin-top:6px;color:#666;font-size:13px">距活动结束：<b style="color:#ff4500">${timeDiscount.data.endTime}</b></div><div visibleOn="${timeDiscount.data.stockLimit > 0}" style="margin-top:4px;color:#999;font-size:12px">剩余折扣库存：${timeDiscount.data.remainingStock} 件</div></div>'

                # P32 商品详情领券入口：本商品可用券（按 goodsType/goodsValue 过滤）+ 已领/可领状态 + 领取按钮
                - type: service
                  name: goodsCoupons
                  api:
                    url: '@query:LitemallCoupon__listCouponsForGoods'
                    data:
                      goodsId: "${id}"
                    sendOn: "${id != null}"
                  body:
                    type: wrapper
                    visibleOn: "${goodsCoupons.data != null && goodsCoupons.data.length > 0}"
                    style:
                      margin: '5px 0'
                    body:
                      - type: tpl
                        tpl: '<div style="color:#999;font-size:13px;margin-bottom:4px">本商品可用优惠券</div>'
                      - type: each
                        name: goodsCoupons.data
                        items:
                          type: wrapper
                          style:
                            background: '#fff8f0'
                            padding: 10px 12px
                            borderRadius: 4px
                            margin: '4px 0'
                            display: flex
                            alignItems: center
                            justifyContent: space-between
                          body:
                            - type: wrapper
                              body:
                                - type: tpl
                                  tpl: '<div><span style="color:#ff6700;font-size:18px;font-weight:bold">¥${item.discount}</span><span style="color:#999;margin-left:6px">满 ${item.min} 元可用</span>${item.tag ? "<span style=\"margin-left:6px;background:#ff6700;color:#fff;font-size:11px;padding:1px 6px;border-radius:8px\">" + item.tag + "</span>" : ""}</div>'
                                - type: tpl
                                  tpl: '<div style="color:#999;font-size:12px">${item.desc || ""}</div>'
                            - type: button
                              label: '${item.claimedByMe ? "已领取" : "立即领取"}'
                              level: '${item.claimedByMe ? "link" : "primary"}'
                              size: sm
                              disabled: '${item.claimedByMe || !item.claimable}'
                              actionType: ajax
                              api:
                                url: '@mutation:LitemallCouponUser__claimCoupon'
                                data:
                                  couponId: "${item.id}"
                              messages:
                                success: '领取成功'
                              reload: 'goodsCoupons'

                - type: form
                  name: skuForm
                  title: 选择规格
                  mode: normal
                  body:
                    - type: select
                      name: productId
                      label: 规格
                      source:
                        url: '@query:LitemallGoodsProduct__findList'
                        data:
                          query:
                            filter:
                              eq:
                                - goodsId
                                - "${id}"
                        valueField: id
                        labelField: specifications
                    - type: input-number
                      name: quantity
                      label: 数量
                      value: 1
                      min: 1
                      max: 999

                  actions:
                    - type: button
                      label: 加入购物车
                      level: primary
                      size: lg
                      actionType: ajax
                      api:
                        url: '@mutation:LitemallCart__addGoods'
                        data:
                          goodsId: "${id}"
                          productId: "${productId}"
                          number: "${quantity}"
                      messages:
                        success: '已加入购物车'
                    - type: button
                      label: 立即购买
                      level: danger
                      size: lg
                      actionType: ajax
                      api:
                        url: '@mutation:LitemallCart__addGoods'
                        data:
                          goodsId: "${id}"
                          productId: "${productId}"
                          number: "${quantity}"
                      redirect: "/storefront-checkout"
                      messages:
                        success: '正在跳转结算...'

                - type: divider
                - type: flex
                  items:
                    - type: button
                      label: 收藏
                      icon: star
                      level: link
                      actionType: ajax
                      api:
                        url: '@mutation:LitemallCollect__addCollect'
                        data:
                          type: 0
                          valueId: "${id}"

      - type: divider

      - type: tabs
        tabs:
          - title: 商品详情
            body:
              type: wrapper
              style:
                padding: 20px
              body:
                type: tpl
                tpl: '${data.detail | raw}'
          - title: 商品参数
            body:
              type: wrapper
              style:
                padding: 20px
              body:
                type: each
                name: data.attributes
                placeholder: 暂无参数
                items:
                  type: flex
                  justify: space-between
                  style:
                    padding: 8px 0
                    borderBottom: 1px solid '#eee'
                  items:
                    - type: tpl
                      tpl: '<span style="color:#999">${item.attribute}</span>'
                    - type: tpl
                      tpl: '<span>${item.value}</span>'
          - title: 商品评论
            body:
              type: wrapper
              style:
                padding: 20px
              body:
                # P33 structured comment submission form (drawer dialog)
                - type: button
                  label: 我要评价
                  level: primary
                  icon: pencil
                  actionType: dialog
                  dialog:
                    title: 商品评价
                    size: md
                    body:
                      type: form
                      api:
                        url: '@mutation:LitemallComment__submitComment'
                        data:
                          orderGoodsId: '${orderGoodsId}'
                          content: '${content}'
                          star: '${star}'
                          hasPicture: '${hasPicture}'
                          picUrls: '${picUrls}'
                          pros: '${pros}'
                          cons: '${cons}'
                          semanticRating: '${semanticRating}'
                      body:
                        - type: input-text
                          name: orderGoodsId
                          label: 订单商品ID
                          required: true
                          description: '请填写已收货未评价的订单商品ID（在订单详情页查看）'
                        - type: input-number
                          name: star
                          label: 星级评分
                          value: 5
                          min: 1
                          max: 5
                          required: true
                        - type: select
                          name: semanticRating
                          label: 整体评价
                          value: 5
                          options:
                            - {label: 非常满意, value: 5}
                            - {label: 满意, value: 4}
                            - {label: 一般, value: 3}
                            - {label: 不太满意, value: 2}
                            - {label: 非常不满意, value: 1}
                        - type: input-tag
                          name: pros
                          label: 优点
                          description: '可添加多个优点标签'
                          placeholder: '如：质量好、物流快'
                        - type: input-tag
                          name: cons
                          label: 缺点
                          description: '可添加多个缺点标签'
                          placeholder: '如：包装一般'
                        - type: switch
                          name: hasPicture
                          label: 含图片
                          value: false
                        - type: input-image
                          name: picUrls
                          label: 上传图片
                          receiver:
                            url: '/f/upload/LitemallComment/picUrls'
                          visibleOn: '${hasPicture}'
                        - type: textarea
                          name: content
                          label: 评价内容
                          required: true
                          minLength: 5
                          maxLength: 500
                  messages:
                    success: '评价提交成功，感谢您的反馈'

                # P33 structured comment summary header (good rate + tag cloud)
                - type: service
                  name: commentSummary
                  api:
                    url: '@query:LitemallComment__getCommentSummary'
                    data:
                      type: 0
                      valueId: "${id}"
                    sendOn: "${id}"
                  body:
                    - type: flex
                      justify: space-between
                      alignItems: center
                      style:
                        background: '#fff8f0'
                        padding: 12px 15px
                        borderRadius: 4px
                        marginBottom: 10px
                      items:
                        - type: tpl
                          tpl: '<div><div style="color:#999;font-size:12px">好评率</div><div style="color:#ff6700;font-size:28px;font-weight:bold">${commentSummary.data.goodRate}%</div><div style="color:#999;font-size:12px">共 ${commentSummary.data.totalCount} 条评价</div></div>'
                        - type: wrapper
                          style:
                            flex: 1
                            marginLeft: 20px
                          body:
                            - type: each
                              name: commentSummary.data.prosTags
                              placeholder: ''
                              items:
                                type: tpl
                                tpl: '<span style="display:inline-block;background:#e8f5e9;color:#2e7d32;padding:2px 10px;border-radius:12px;margin:2px;font-size:12px">优 ${item.tag} ${item.count}</span>'
                            - type: each
                              name: commentSummary.data.consTags
                              placeholder: ''
                              items:
                                type: tpl
                                tpl: '<span style="display:inline-block;background:#ffebee;color:#c62828;padding:2px 10px;border-radius:12px;margin:2px;font-size:12px">缺 ${item.tag} ${item.count}</span>'

                - type: divider

                # P33 filter tabs (all / hasPicture / good / bad)
                - type: button-group
                  active: '${showType || "all"}'
                  buttons:
                    - type: button
                      label: 全部
                      actionType: reload
                      target: 'comments'
                      level: '${showType == "all" || showType == null ? "primary" : "link"}'
                      data:
                        showType: all
                    - type: button
                      label: 有图
                      actionType: reload
                      target: 'comments'
                      level: '${showType == "hasPicture" ? "primary" : "link"}'
                      data:
                        showType: hasPicture
                    - type: button
                      label: 好评
                      actionType: reload
                      target: 'comments'
                      level: '${showType == "good" ? "primary" : "link"}'
                      data:
                        showType: good
                    - type: button
                      label: 差评
                      actionType: reload
                      target: 'comments'
                      level: '${showType == "bad" ? "primary" : "link"}'
                      data:
                        showType: bad

                # Comment list with P33 structured fields (pros/cons tags + semantic rating)
                - type: service
                  name: comments
                  api:
                    url: '@query:LitemallComment__commentList'
                    data:
                      type: 0
                      valueId: "${id}"
                      showType: "${showType || 'all'}"
                      page: 1
                      pageSize: 10
                    sendOn: "${id}"
                  body:
                    type: each
                    name: items
                    placeholder: '<div style="padding:40px;text-align:center;color:#999">暂无评论</div>'
                    items:
                      type: wrapper
                      style:
                        padding: 10px 0
                        borderBottom: 1px solid '#eee'
                      body:
                        - type: flex
                          items:
                            - type: tpl
                              tpl: '<b>${item.nickname || "匿名用户"}</b>'
                            - type: tpl
                              tpl: '<span style="color:#999;margin-left:10px">${item.addTime}</span>'
                        # P33 structured: star + semantic rating label
                        - type: tpl
                          tpl: '<div style="margin:5px 0"><span style="color:#ff6700">${item.star | repeat:"★"}</span><span style="color:#999;margin-left:8px">${item.semanticRating == 5 ? "非常满意" : (item.semanticRating == 4 ? "满意" : (item.semanticRating == 3 ? "一般" : (item.semanticRating == 2 ? "不太满意" : (item.semanticRating == 1 ? "非常不满意" : ""))))}</span></div>'
                        # pros/cons shown as colored badges (JSON text shown as-is)
                        - type: tpl
                          visibleOn: "${item.pros}"
                          tpl: '<div style="margin:4px 0"><span style="color:#2e7d32;font-size:12px">优点：</span><span style="display:inline-block;background:#e8f5e9;color:#2e7d32;padding:1px 8px;border-radius:10px;font-size:12px">${item.pros}</span></div>'
                        - type: tpl
                          visibleOn: "${item.cons}"
                          tpl: '<div style="margin:4px 0"><span style="color:#c62828;font-size:12px">缺点：</span><span style="display:inline-block;background:#ffebee;color:#c62828;padding:1px 8px;border-radius:10px;font-size:12px">${item.cons}</span></div>'
                        - type: tpl
                          tpl: '<p style="margin:5px 0">${item.content}</p>'
