type: page
title: 商品详情
body:
  - type: wrapper
    className: storefront-header
    body:
      type: flex
      justify: space-between
      alignItems: center
      style:
        padding: 10px 20px
        backgroundColor: '#fff'
        borderBottom: 2px solid '#ff6700'
      items:
        - type: wrapper
          body:
            - type: button
              label: '<b style="font-size:24px;color:#ff6700">商城</b>'
              level: link
              actionType: link
              link: "/storefront-home"
        - type: wrapper
          body:
            - type: button
              label: 购物车
              icon: shopping-cart
              level: link
              actionType: link
              link: "/storefront-cart"
            - type: button
              label: 用户中心
              icon: user
              level: link
              actionType: link
              link: "/storefront-user-center"

  - type: service
    name: goodsDetail
    api:
      url: '@query:LitemallGoods__frontDetail?id=${id}'
      sendOn: "${id}"
    body:
      - type: grid
        columns:
          - md: 5
            body:
              type: wrapper
              style:
                padding: 20px
              body:
                type: tpl
                tpl: '<img src="${data.picUrl}" style="width:100%;border-radius:4px"/>'
          - md: 7
            body:
              type: wrapper
              style:
                padding: 20px
              body:
                - type: tpl
                  tpl: '<h2>${data.name}</h2>'
                - type: tpl
                  tpl: '<p style="color:#999">${data.brief}</p>'
                - type: divider
                - type: tpl
                  tpl: '<div style="background:#fff8f0;padding:15px;border-radius:4px;margin:10px 0"><span style="color:#999">价格：</span><span style="color:#ff6700;font-size:28px;font-weight:bold">¥${data.retailPrice}</span></div>'
                - type: tpl
                  tpl: '<div style="margin:5px 0"><span style="color:#999">专柜价：</span><span style="text-decoration:line-through;color:#999">¥${data.counterPrice}</span></div>'

                - type: service
                  name: promotionSummary
                  api:
                    url: '@query:LitemallPromotionActivity__selectPromotionForOrder'
                    data:
                      goodsPrice: "${data.retailPrice}"
                      goodsScopeIds:
                        - "${id}"
                    sendOn: "${id != null && data != null}"
                  body:
                    type: tpl
                    visibleOn: "${promotionSummary.data > 0}"
                    tpl: '<div style="background:#fff0e0;padding:8px 15px;border-radius:4px;margin:5px 0"><span style="color:#ff6700">满减优惠</span>：本商品参与满减，单件最高可减 <b style="color:#ff6700">¥${promotionSummary.data}</b>（满减自动生效，最终优惠以下单结算为准）</div>'

                - type: service
                  name: timeDiscount
                  api:
                    url: '@query:LitemallTimeDiscount__selectTimeDiscountForProduct'
                    data:
                      goodsId: "${id}"
                      productId: "${productId}"
                    sendOn: "${id != null}"
                  body:
                    - type: tpl
                      visibleOn: "${timeDiscount.data != null}"
                      tpl: '<div style="background:linear-gradient(90deg,#fff0e0,#ffe4c4);padding:12px 15px;border-radius:4px;margin:5px 0;border:1px solid #ffb74d"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="background:#ff4500;color:#fff;font-size:12px;padding:2px 8px;border-radius:3px;font-weight:bold">限时折扣</span><span style="text-decoration:line-through;color:#999">¥${timeDiscount.data.originalPrice}</span><span style="color:#ff6700;font-size:24px;font-weight:bold">¥${timeDiscount.data.promoPrice}</span><span style="color:#ff6700">直降 ¥${timeDiscount.data.discountAmount}</span></div><div style="margin-top:6px;color:#666;font-size:13px">距活动结束：<b style="color:#ff4500">${timeDiscount.data.endTime}</b></div><div visibleOn="${timeDiscount.data.stockLimit > 0}" style="margin-top:4px;color:#999;font-size:12px">剩余折扣库存：${timeDiscount.data.remainingStock} 件</div></div>'

                - type: form
                  name: skuForm
                  title: 选择规格
                  mode: normal
                  body:
                    - type: select
                      name: productId
                      label: 规格
                      source:
                        url: '@query:LitemallGoodsProduct__findList'
                        data:
                          query:
                            filter:
                              eq:
                                - goodsId
                                - "${id}"
                        valueField: id
                        labelField: specifications
                    - type: input-number
                      name: quantity
                      label: 数量
                      value: 1
                      min: 1
                      max: 999

                  actions:
                    - type: button
                      label: 加入购物车
                      level: primary
                      size: lg
                      actionType: ajax
                      api:
                        url: '@mutation:LitemallCart__addGoods'
                        data:
                          goodsId: "${id}"
                          productId: "${productId}"
                          number: "${quantity}"
                      messages:
                        success: '已加入购物车'
                    - type: button
                      label: 立即购买
                      level: danger
                      size: lg
                      actionType: ajax
                      api:
                        url: '@mutation:LitemallCart__addGoods'
                        data:
                          goodsId: "${id}"
                          productId: "${productId}"
                          number: "${quantity}"
                      redirect: "/storefront-checkout"
                      messages:
                        success: '正在跳转结算...'

                - type: divider
                - type: flex
                  items:
                    - type: button
                      label: 收藏
                      icon: star
                      level: link
                      actionType: ajax
                      api:
                        url: '@mutation:LitemallCollect__addCollect'
                        data:
                          type: 0
                          valueId: "${id}"

      - type: divider

      - type: tabs
        tabs:
          - title: 商品详情
            body:
              type: wrapper
              style:
                padding: 20px
              body:
                type: tpl
                tpl: '${data.detail | raw}'
          - title: 商品参数
            body:
              type: wrapper
              style:
                padding: 20px
              body:
                type: each
                name: data.attributes
                placeholder: 暂无参数
                items:
                  type: flex
                  justify: space-between
                  style:
                    padding: 8px 0
                    borderBottom: 1px solid '#eee'
                  items:
                    - type: tpl
                      tpl: '<span style="color:#999">${item.attribute}</span>'
                    - type: tpl
                      tpl: '<span>${item.value}</span>'
          - title: 商品评论
            body:
              type: wrapper
              style:
                padding: 20px
              body:
                type: service
                name: comments
                api:
                  url: '@query:LitemallComment__commentList'
                  data:
                    type: 0
                    valueId: "${id}"
                    page: 1
                    pageSize: 10
                  sendOn: "${id}"
                body:
                  type: each
                  name: items
                  placeholder: '<div style="padding:40px;text-align:center;color:#999">暂无评论</div>'
                  items:
                    type: wrapper
                    style:
                      padding: 10px 0
                      borderBottom: 1px solid '#eee'
                    body:
                      - type: flex
                        items:
                          - type: tpl
                            tpl: '<b>${item.nickname || "匿名用户"}</b>'
                          - type: tpl
                            tpl: '<span style="color:#999;margin-left:10px">${item.addTime}</span>'
                      - type: tpl
                        tpl: '<p style="margin:5px 0">${item.content}</p>'
