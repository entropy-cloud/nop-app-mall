type: page
title: 登录注册
body:
  - type: wrapper
    style:
      padding: 40px 20px
      textAlign: center
    body:
      - type: tpl
        tpl: '<b style="font-size:28px;color:#ff6700">商城</b>'

  - type: wrapper
    style:
      maxWidth: 400px
      margin: 0 auto
      padding: 20px
    body:
      - type: tabs
        tabs:
          - title: 登录
            body:
              type: form
              name: loginForm
              title: ''
              api:
                url: '@mutation:LoginApi__login'
                data:
                  username: "${username}"
                  password: "${password}"
              redirect: "/storefront-home"
              body:
                - type: input-text
                  name: username
                  label: 用户名
                  required: true
                  placeholder: 请输入用户名
                - type: input-password
                  name: password
                  label: 密码
                  required: true
                  placeholder: 请输入密码
              actions:
                - type: button
                  label: 登录
                  level: primary
                  actionType: submit
                - type: button
                  label: 忘记密码？
                  level: link
                  actionType: link
                  link: "/storefront-login?tab=reset"

          - title: 注册
            body:
              type: form
              name: signUpForm
              title: ''
              api:
                url: '@mutation:LoginApi__signUp'
                data:
                  username: "${username}"
                  password: "${password}"
                  mobile: "${mobile}"
              redirect: "/storefront-home"
              body:
                - type: input-text
                  name: username
                  label: 用户名
                  required: true
                  placeholder: 请输入用户名
                - type: input-password
                  name: password
                  label: 密码
                  required: true
                  placeholder: 请输入密码
                - type: input-text
                  name: mobile
                  label: 手机号
                  required: true
                  placeholder: 请输入手机号
              actions:
                - type: button
                  label: 注册
                  level: primary
                  actionType: submit

          - title: 忘记密码
            visibleOn: "${tab == 'reset'}"
            body:
              type: form
              name: resetForm
              title: ''
              mode: normal
              body:
                - type: input-text
                  name: mobile
                  label: 手机号
                  required: true
                  placeholder: 请输入注册时的手机号
                - type: button
                  label: 发送验证码
                  level: primary
                  actionType: ajax
                  api:
                    url: '@mutation:LoginApi__sendResetCode'
                    data:
                      mobile: "${mobile}"
                  messages:
                    success: '验证码已发送'
                - type: input-text
                  name: code
                  label: 验证码
                  required: true
                  placeholder: 请输入收到的验证码
                - type: input-password
                  name: newPassword
                  label: 新密码
                  required: true
                  placeholder: 请输入新密码
              actions:
                - type: button
                  label: 重置密码
                  level: primary
                  actionType: ajax
                  api:
                    url: '@mutation:LoginApi__resetPassword'
                    data:
                      mobile: "${mobile}"
                      code: "${code}"
                      newPassword: "${newPassword}"
                  redirect: "/storefront-login"
                  messages:
                    success: '密码重置成功，请登录'
