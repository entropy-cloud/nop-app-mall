type: page
title: 个人中心
body:
  - type: wrapper
    className: storefront-header
    body:
      type: flex
      justify: space-between
      alignItems: center
      style:
        padding: 10px 20px
        backgroundColor: '#fff'
        borderBottom: 2px solid '#ff6700'
      items:
        - type: wrapper
          body:
            - type: button
              label: '<b style="font-size:24px;color:#ff6700">商城</b>'
              level: link
              actionType: link
              link: "/storefront-home"
        - type: wrapper
          body:
            - type: button
              label: 退出登录
              level: link
              actionType: ajax
              api:
                url: '@mutation:LoginApi__logout'
              redirect: "/storefront-home"

  - type: wrapper
    style:
      padding: 20px
    body:
      - type: service
        name: userInfo
        api:
          url: '@query:LoginApi__getLoginUserInfo'
          sendOn: true
        body:
          - type: card
            header:
              title: '${data.nickName || data.userName || "用户"}'
              avatar: '${data.avatar}'
              description: '${data.mobile || ""}'
            body:
              type: grid
              columns:
                - type: wrapper
                  style:
                    textAlign: center
                    padding: 15px
                  body:
                    - type: tpl
                      tpl: '<div style="font-size:24px;color:#ff6700;font-weight:bold">0</div>'
                    - type: tpl
                      tpl: '<div style="color:#999">待付款</div>'
                - type: wrapper
                  style:
                    textAlign: center
                    padding: 15px
                  body:
                    - type: tpl
                      tpl: '<div style="font-size:24px;color:#ff6700;font-weight:bold">0</div>'
                    - type: tpl
                      tpl: '<div style="color:#999">待发货</div>'
                - type: wrapper
                  style:
                    textAlign: center
                    padding: 15px
                  body:
                    - type: tpl
                      tpl: '<div style="font-size:24px;color:#ff6700;font-weight:bold">0</div>'
                    - type: tpl
                      tpl: '<div style="color:#999">待收货</div>'
                - type: wrapper
                  style:
                    textAlign: center
                    padding: 15px
                  body:
                    - type: tpl
                      tpl: '<div style="font-size:24px;color:#ff6700;font-weight:bold">0</div>'
                    - type: tpl
                      tpl: '<div style="color:#999">已完成</div>'

      - type: service
        name: memberLevel
        api:
          url: '@query:LitemallMemberLevel__getMyLevelProgress'
          sendOn: true
        body:
          - type: card
            header:
              title: 会员等级
            body:
              - type: wrapper
                style:
                  display: flex
                  alignItems: center
                  justifyContent: space-between
                  padding: '5px 0'
                body:
                  - type: tpl
                    tpl: '<span style="font-size:16px;font-weight:bold;color:#ff6700">${data.currentLevelName || "普通用户"}</span>'
                  - type: tpl
                    visibleOn: '${!!data.nextLevel}'
                    tpl: '<span style="color:#999">距 <b>${data.nextLevelName}</b> 还需 <b style="color:#ff6700">¥${data.remaining}</b>（已累计消费 ¥${data.totalSpending}）</span>'
                  - type: tpl
                    visibleOn: '${!data.nextLevel}'
                    tpl: '<span style="color:#999">已达最高等级（已累计消费 ¥${data.totalSpending}）</span>'

      - type: service
        name: checkInStatus
        api:
          url: '@query:LitemallCheckInRecord__getMyCheckInStatus'
          sendOn: true
        body:
          - type: card
            header:
              title: 每日签到
            body:
              - type: wrapper
                style:
                  display: flex
                  alignItems: center
                  justifyContent: space-around
                  padding: '10px 0'
                body:
                  - type: wrapper
                    style:
                      textAlign: center
                    body:
                      - type: tpl
                        tpl: '<div style="font-size:24px;color:#ff6700;font-weight:bold">${data.consecutiveDays || 0}</div>'
                      - type: tpl
                        tpl: '<div style="color:#999">连续签到(天)</div>'
                  - type: wrapper
                    style:
                      textAlign: center
                    body:
                      - type: tpl
                        tpl: '<div style="font-size:24px;color:#ff6700;font-weight:bold">${data.totalDays || 0}</div>'
                      - type: tpl
                        tpl: '<div style="color:#999">累计签到(天)</div>'
                  - type: wrapper
                    style:
                      textAlign: center
                    body:
                      - type: tpl
                        tpl: '<div style="font-size:24px;color:#ff6700;font-weight:bold">${data.accountBalance || 0}</div>'
                      - type: tpl
                        tpl: '<div style="color:#999">可用积分</div>'
              - type: each
                name: rewardRules
                items: '${data.rewardRules}'
                placeholder: ''
                body:
                  type: tag
                  label: '${"第" + item.daySeq + "天 +" + item.pointReward + "积分"}'
                  style:
                    margin: '0 4px'
              - type: button
                label: '${data.todayChecked ? "今日已签到" : "立即签到"}'
                level: primary
                block: true
                disabledOn: '${data.todayChecked}'
                actionType: ajax
                api:
                  url: '@mutation:LitemallCheckInRecord__checkInToday'
                feedback:
                  title: 签到成功
                  body:
                    - type: tpl
                      tpl: '<div style="text-align:center;padding:10px">本次签到获得 <b style="color:#ff6700;font-size:20px">${response.data.pointsEarned}</b> 积分<br/>已连续签到 <b>${response.data.consecutiveDays}</b> 天，当前积分余额 <b>${response.data.accountBalance}</b></div>'
                reload: checkInStatus

      - type: divider

      - type: service
        name: unreadMessages
        api:
          url: '@query:LitemallUserMessage__getUnreadCount'
          sendOn: true
        body:
          - type: card
            header:
              title: 我的消息
            body:
              - type: wrapper
                style:
                  display: flex
                  alignItems: center
                  justifyContent: space-between
                  padding: '10px 0'
                body:
                  - type: tpl
                    tpl: '<span style="color:#999">未读消息 <b style="color:#ff6700;font-size:18px">${data || 0}</b> 条</span>'
                  - type: button
                    label: 进入消息中心
                    level: primary
                    actionType: link
                    link: "/storefront-message-center"

      - type: grid
        columns:
          - md: 6
            body:
              type: button
              label: 我的订单
              icon: profile
              level: primary
              block: true
              actionType: link
              link: "/storefront-order-list"
          - md: 6
            body:
              type: button
              label: 收货地址
              icon: environment
              level: primary
              block: true
              actionType: link
              link: "/storefront-address"
          - md: 6
            body:
              type: button
              label: 我的优惠券
              icon: gift
              level: primary
              block: true
              actionType: link
              link: "/storefront-coupon-center"
          - md: 6
            body:
              type: button
              label: 我的积分
              icon: diamond
              level: primary
              block: true
              actionType: link
              link: "/storefront-my-points"
          - md: 6
            body:
              type: button
              label: 我的收藏
              icon: star
              level: primary
              block: true
              actionType: link
              link: "/storefront-collect"
          - md: 6
            body:
              type: button
              label: 浏览足迹
              icon: history
              level: primary
              block: true
              actionType: link
              link: "/storefront-footprint"
          - md: 6
            body:
              type: button
              label: 售后管理
              icon: rollback
              level: primary
              block: true
              actionType: link
              link: "/storefront-aftersale-list"
          - md: 6
            body:
              type: button
              label: 消息中心
              icon: bell
              level: primary
              block: true
              actionType: link
              link: "/storefront-message-center"
          - md: 6
            body:
              type: button
              label: 我的团购
              icon: team
              level: primary
              block: true
              actionType: link
              link: "/storefront-groupon-list"
          - md: 6
            body:
              type: button
              label: 提交反馈
              icon: message
              level: primary
              block: true
              actionType: link
              link: "/storefront-feedback"
          - md: 6
            body:
              type: button
              label: 继续购物
              icon: shopping
              level: primary
              block: true
              actionType: link
              link: "/storefront-home"
