type: page
title: 结算
body:
  - type: wrapper
    className: storefront-header
    body:
      type: flex
      justify: space-between
      alignItems: center
      style:
        padding: 10px 20px
        backgroundColor: '#fff'
        borderBottom: 2px solid '#ff6700'
      items:
        - type: wrapper
          body:
            - type: button
              label: '<b style="font-size:24px;color:#ff6700">商城</b>'
              level: link
              actionType: link
              link: "/storefront-home"
        - type: wrapper
          body:
            - type: button
              label: 返回购物车
              level: link
              actionType: link
              link: "/storefront-cart"

  - type: grid
    style:
      padding: 20px
    columns:
      - md: 8
        body:
          type: wrapper
          body:
            - type: tpl
              tpl: '<h3>配送方式</h3>'
            - type: form
              name: deliveryForm
              title: ''
              mode: normal
              body:
                - type: radios
                  name: deliveryType
                  label: 配送方式
                  value: 0
                  options:
                    - {label: '快递配送', value: 0}
                    - {label: '门店自提', value: 10}

            - type: tpl
              tpl: '<h3>收货地址</h3>'
              visibleOn: '${deliveryForm.deliveryType != 10}'
            - type: service
              name: addressList
              api:
                url: '@query:LitemallAddress__list'
                sendOn: '${deliveryForm.deliveryType != 10}'
              visibleOn: '${deliveryForm.deliveryType != 10}'
              body:
                type: form
                name: selectedAddress
                title: ''
                mode: normal
                body:
                  - type: select
                    name: addressId
                    label: 选择地址
                    source: '${items}'
                    labelField: name
                    valueField: id
                    required: true
                    description: "${item ? item.province + item.city + item.county + item.addressDetail : ''}"

            - type: tpl
              tpl: '<h3>自提门店（运费 ¥0.00）</h3>'
              visibleOn: '${deliveryForm.deliveryType == 10}'
            - type: service
              name: pickupStoreList
              api:
                url: '@query:LitemallPickupStore__listActiveStores'
                sendOn: '${deliveryForm.deliveryType == 10}'
              visibleOn: '${deliveryForm.deliveryType == 10}'
              body:
                type: form
                name: selectedStore
                title: ''
                mode: normal
                body:
                  - type: select
                    name: pickupStoreId
                    label: 选择门店
                    source: '${items}'
                    labelField: name
                    valueField: id
                    required: true
                    description: "${item ? item.address + '（' + item.openingHours + '）' + (item.phone ? ' 电话：' + item.phone : '') : ''}"

            - type: divider
            - type: tpl
              tpl: '<h3>商品清单</h3>'
            - type: service
              name: cartItems
              api:
                url: '@query:LitemallCart__checkedList'
                sendOn: true
              body:
                type: each
                name: items
                placeholder: '<div style="padding:20px;color:#999">购物车没有选中商品</div>'
                items:
                  type: flex
                  alignItems: center
                  style:
                    padding: 10px 0
                    borderBottom: 1px solid '#eee'
                  items:
                    - type: tpl
                      tpl: '<img src="${item.picUrl}" style="width:50px;height:50px;border-radius:4px"/>'
                    - type: wrapper
                      style:
                        marginLeft: 10px
                        flex: '1'
                      body:
                        - type: tpl
                          tpl: '${item.goodsName}'
                        - type: tpl
                          tpl: '<span style="color:#999;font-size:12px">${item.specifications} x ${item.number}</span>'
                    - type: tpl
                      tpl: '<span style="color:#ff6700">¥${item.price * item.number}</span>'

            - type: divider
            - type: tpl
              tpl: '<h3>优惠券</h3>'
            - type: service
              name: couponList
              api:
                url: '@query:LitemallCoupon__listMyCoupons'
                data:
                  status: 0
                  page: 1
                  pageSize: 20
                sendOn: true
              body:
                type: form
                name: couponForm
                title: ''
                mode: normal
                body:
                  - type: select
                    name: couponUserId
                    label: 选择优惠券
                    source: '${items}'
                    labelTpl: '${coupon.name} - 满${coupon.min}减${coupon.discount}'
                    valueField: id
                    clearable: true
                    placeholder: 不使用优惠券

            - type: divider
            - type: tpl
              tpl: '<h3>积分抵扣</h3>'
            - type: service
              name: pointsService
              api:
                url: '@query:LitemallPointsAccount__getMyPoints'
                sendOn: true
              body:
                type: form
                name: pointsForm
                title: ''
                mode: normal
                body:
                  - type: input-number
                    name: usePoints
                    label: 使用积分
                    min: 0
                    max: '${data || 0}'
                    step: 1
                    precision: 0
                    placeholder: '不使用积分抵扣'
                    description: "当前可用积分：${data || 0}（兑换比例默认 100 积分=¥1，抵扣上限默认订单金额的 30%）"
                    visibleOn: '${data > 0}'

            - type: divider
            - type: form
              name: orderForm
              title: 订单备注
              mode: normal
              body:
                - type: input-text
                  name: message
                  label: 留言
                  placeholder: 选填，给商家留言'

      - md: 4
        body:
          type: wrapper
          style:
            padding: 15px
            backgroundColor: '#fafafa'
            borderRadius: 4px
          body:
            - type: tpl
              tpl: '<h3>价格汇总</h3>'
            - type: service
              name: promotionService
              api:
                url: '@query:LitemallPromotionActivity__selectPromotionForOrder'
                data:
                  goodsPrice: "${SUM(cartItems.items, 'price * number')}"
                sendOn: "${cartItems.items != null}"
              body:
                type: wrapper
                body: []
            - type: service
              name: freightService
              api:
                url: '@query:LitemallSystem__getFreightPrice'
                sendOn: "${deliveryForm.deliveryType != 10}"
              body:
                type: wrapper
                body:
                  - type: flex
                    justify: space-between
                    items:
                      - type: tpl
                        tpl: '商品金额：'
                      - type: tpl
                        tpl: '<span>¥${cartItems.items ? SUM(cartItems.items, "price * number") : "0.00"}</span>'
                  - type: flex
                    justify: space-between
                    style:
                      margin: 8px 0
                    items:
                      - type: tpl
                        tpl: '运费：'
                      - type: tpl
                        tpl: '<span>¥${deliveryForm.deliveryType == 10 ? "0.00" : (data || 0)}</span>'
                  - type: flex
                    justify: space-between
                    visibleOn: "${promotionService.data > 0}"
                    style:
                      margin: 8px 0
                    items:
                      - type: tpl
                        tpl: '活动优惠：'
                      - type: tpl
                        tpl: '<span style="color:#ff6700">-¥${promotionService.data}</span>'
                  - type: divider
                  - type: flex
                    justify: space-between
                    alignItems: center
                    items:
                      - type: tpl
                        tpl: '<b>应付金额：</b>'
                      - type: tpl
                        tpl: '<span style="color:#ff6700;font-size:28px;font-weight:bold">¥${(cartItems.items ? SUM(cartItems.items, "price * number") : 0) + (deliveryForm.deliveryType == 10 ? 0 : (data || 0)) - (promotionService.data || 0)}</span>'
                  - type: button
                    label: 提交订单
                    level: primary
                    size: lg
                    actionType: ajax
                    api:
                      url: '@mutation:LitemallOrder__submit'
                      data:
                        addressId: "${deliveryForm.deliveryType == 10 ? null : selectedAddress.addressId}"
                        message: "${orderForm.message}"
                        freightPrice: "${deliveryForm.deliveryType == 10 ? 0 : freightService.data}"
                        couponUserId: "${couponForm.couponUserId}"
                        grouponRulesId: "${grouponRulesId}"
                        grouponId: "${grouponId}"
                        usePoints: "${pointsForm.usePoints}"
                        deliveryType: "${deliveryForm.deliveryType}"
                        pickupStoreId: "${selectedStore.pickupStoreId}"
                    redirect: "/storefront-order-result?orderId=${event.data.result.id}"
                    messages:
                      success: '订单提交成功'
