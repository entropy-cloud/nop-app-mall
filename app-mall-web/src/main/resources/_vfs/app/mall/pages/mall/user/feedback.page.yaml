type: page
title: 提交反馈
body:
  - type: wrapper
    className: storefront-header
    body:
      type: flex
      justify: space-between
      alignItems: center
      style:
        padding: 10px 20px
        backgroundColor: '#fff'
        borderBottom: 2px solid '#ff6700'
      items:
        - type: wrapper
          body:
            - type: button
              label: '<b style="font-size:24px;color:#ff6700">商城</b>'
              level: link
              actionType: link
              link: "/storefront-home"
        - type: wrapper
          body:
            - type: input-text
              name: searchKeyword
              placeholder: 搜索商品
              style:
                width: 300px
            - type: button
              label: 搜索
              level: primary
              actionType: link
              link: "/storefront-search?keyword=${searchKeyword}"
        - type: wrapper
          body:
            - type: button
              label: 购物车
              icon: shopping-cart
              level: link
              actionType: link
              link: "/storefront-cart"
            - type: button
              label: 用户中心
              icon: user
              level: link
              actionType: link
              link: "/storefront-user-center"

  - type: wrapper
    style:
      padding: 20px
      maxWidth: 700px
      margin: '0 auto'
    body:
      - type: tpl
        tpl: '<h3 style="color:#333;border-left:4px solid #ff6700;padding-left:8px;margin-bottom:15px">意见反馈</h3>'
      - type: form
        name: feedbackForm
        title: 反馈内容
        mode: normal
        body:
          - type: select
            name: feedType
            label: 反馈类型
            required: true
            options:
              - label: 商品相关
                value: '1'
              - label: 功能异常
                value: '2'
              - label: 优化建议
                value: '3'
              - label: 其他
                value: '4'
          - type: textarea
            name: content
            label: 反馈内容
            required: true
            placeholder: 请详细描述您的反馈
            minLength: 10
            maxLength: 500

        actions:
          - type: button
            label: 提交反馈
            level: primary
            size: lg
            actionType: ajax
            api:
              url: '@mutation:LitemallFeedback__submitFeedback'
              data:
                feedType: "${feedType}"
                content: "${content}"
            redirect: "/storefront-user-center"
            messages:
              success: '反馈已提交，感谢您的支持'
          - type: button
            label: 返回
            level: link
            size: lg
            actionType: link
            link: "/storefront-user-center"
