type: page
title: 营销活动效果分析
body:
  - type: form
    title: 查询条件
    mode: inline
    wrapWithPanel: false
    body:
      - type: input-date-range
        name: dateRange
        label: 时间范围
        format: X
      - type: input-text
        name: promotionActivityId
        label: 满减活动ID
        placeholder: 可选，填入后满减面板按活动归因
      - type: button
        label: 刷新
        level: primary
        actionType: reload
        target: promotionEffect,couponUsage,pinTuanEffect,flashSaleEffect
      - type: select
        name: marketingFormat
        label: 模板导出
        value: xlsx
        options:
          - label: Excel (xlsx)
            value: xlsx
          - label: PDF
            value: pdf
      - type: button
        label: 导出报表
        level: primary
        actionType: ajax
        api:
          url: '@query:LitemallPromotionActivity__exportMarketingReport'
          data:
            renderType: '${marketingFormat}'
            startDate: "${dateRange[0] ? dateRange[0] | date : ''}"
            endDate: "${dateRange[1] ? dateRange[1] | date : ''}"
            promotionActivityId: '${promotionActivityId}'
          responseType: blob

  - type: grid
    columns:
      - md: 6
        body:
          - type: service
            name: promotionEffect
            api:
              url: '@query:LitemallPromotionActivity__getPromotionEffectiveness'
              data:
                activityId: '${promotionActivityId}'
                startDate: "${dateRange[0] ? dateRange[0] | date : ''}"
                endDate: "${dateRange[1] ? dateRange[1] | date : ''}"
              sendOn: true
            body:
              - type: panel
                title: 满减效果（按活动归因 / 时间窗聚合）
                body:
                  - type: tpl
                    tpl: '参与单数：<b>${promotedOrderCount}</b>'
                  - type: tpl
                    tpl: '订单 GMV：<b>${totalGmv}</b>'
                  - type: tpl
                    tpl: '满减优惠额：<b>${totalDiscount}</b>'
                  - type: tpl
                    tpl: '参与人数（distinct userId，按活动归因时统计）：<b>${participantCount}</b>'
                  - type: tpl
                    tpl: '说明：填入满减活动ID时按活动归因（经参与记录）；不填时为时间窗内 promotionPrice>0 订单聚合口径。'
      - md: 6
        body:
          - type: service
            name: couponUsage
            api:
              url: '@query:LitemallCoupon__getCouponUsageStatistics'
              data:
                startDate: "${dateRange[0] ? dateRange[0] | date : ''}"
                endDate: "${dateRange[1] ? dateRange[1] | date : ''}"
              sendOn: true
            body:
              - type: panel
                title: 优惠券核销统计（全量券）
                body:
                  - type: tpl
                    tpl: '领取数：<b>${claimedCount}</b>'
                  - type: tpl
                    tpl: '已使用数：<b>${usedCount}</b>'
                  - type: tpl
                    tpl: '核销率：${claimedCount ? (usedCount / claimedCount * 100).toFixed(1) : 0}%'
                  - type: tpl
                    tpl: '核销拉动 GMV：¥<b>${pulledGmv}</b>'

  - type: service
    name: pinTuanEffect
    api:
      url: '@query:LitemallPinTuanActivity__getPinTuanEffectiveness'
      data:
        startDate: "${dateRange[0] ? dateRange[0] | date : ''}"
        endDate: "${dateRange[1] ? dateRange[1] | date : ''}"
      sendOn: true
    body:
      - type: panel
        title: 拼团效果（全量拼团）
        body:
          - type: grid
            columns:
              - md: 3
                body:
                  - type: tpl
                    tpl: '开团数：<b>${openedGroups}</b>'
              - md: 3
                body:
                  - type: tpl
                    tpl: '成团数：<b>${successGroups}</b>'
              - md: 3
                body:
                  - type: tpl
                    tpl: '成团率：${openedGroups ? (successGroups / openedGroups * 100).toFixed(1) : 0}%'
              - md: 3
                body:
                  - type: tpl
                    tpl: '参与人数：${participantCount}，GMV：¥${totalGmv}'

  - type: service
    name: flashSaleEffect
    api:
      url: '@query:LitemallFlashSale__getFlashSaleEffectiveness'
      data:
        startDate: "${dateRange[0] ? dateRange[0] | date : ''}"
        endDate: "${dateRange[1] ? dateRange[1] | date : ''}"
      sendOn: true
    body:
      - type: panel
        title: 秒杀效果（按场次归因）
        body:
          - type: grid
            columns:
              - md: 3
                body:
                  - type: tpl
                    tpl: '成交单数：<b>${dealOrderCount}</b>'
              - md: 3
                body:
                  - type: tpl
                    tpl: '成交 GMV：¥<b>${totalGmv}</b>'
              - md: 3
                body:
                  - type: tpl
                    tpl: '参与人数：${participantCount}'
              - md: 3
                body:
                  - type: tpl
                    tpl: '限购命中拒绝数：${rejectedCount}'
          - type: grid
            columns:
              - md: 6
                body:
                  - type: tpl
                    tpl: '场次售罄率（sessionStock=0 场次占比）：${soldOutRate ? (soldOutRate * 100).toFixed(1) : 0}%'
              - md: 6
                body:
                  - type: tpl
                    tpl: '说明：经 Order.flashSaleSessionId 按场次归因成交单数/GMV；售罄率为已售罄场次占比。'
