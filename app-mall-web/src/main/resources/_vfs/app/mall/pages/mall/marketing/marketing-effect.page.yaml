type: page
title: 营销活动效果分析
body:
  - type: form
    title: 查询条件
    mode: inline
    wrapWithPanel: false
    body:
      - type: input-date-range
        name: dateRange
        label: 时间范围
        format: X
      - type: button
        label: 刷新
        level: primary
        actionType: reload
        target: promotionEffect,couponUsage,pinTuanEffect

  - type: grid
    columns:
      - md: 6
        body:
          - type: service
            name: promotionEffect
            api:
              url: '@query:LitemallPromotionActivity__getPromotionEffectiveness'
              data:
                startDate: "${dateRange[0] ? dateRange[0] | date : ''}"
                endDate: "${dateRange[1] ? dateRange[1] | date : ''}"
              sendOn: true
            body:
              - type: panel
                title: 满减效果（聚合口径，按时间窗）
                body:
                  - type: tpl
                    tpl: '命中满减的订单数：<b>${promotedOrderCount}</b>'
                  - type: tpl
                    tpl: '订单 GMV（orderPrice 之和）：¥<b>${totalGmv}</b>'
                  - type: tpl
                    tpl: '满减优惠额（promotionPrice 之和）：¥<b>${totalDiscount}</b>'
                  - type: tpl
                    tpl: '备注：按活动归因需用户参与记录实体（ORM model-gap，待授权）；当前为时间窗聚合口径。'
      - md: 6
        body:
          - type: service
            name: couponUsage
            api:
              url: '@query:LitemallCoupon__getCouponUsageStatistics'
              data:
                startDate: "${dateRange[0] ? dateRange[0] | date : ''}"
                endDate: "${dateRange[1] ? dateRange[1] | date : ''}"
              sendOn: true
            body:
              - type: panel
                title: 优惠券核销统计（全量券）
                body:
                  - type: tpl
                    tpl: '领取数：<b>${claimedCount}</b>'
                  - type: tpl
                    tpl: '已使用数：<b>${usedCount}</b>'
                  - type: tpl
                    tpl: '核销率：${claimedCount ? (usedCount / claimedCount * 100).toFixed(1) : 0}%'
                  - type: tpl
                    tpl: '核销拉动 GMV：¥<b>${pulledGmv}</b>'

  - type: service
    name: pinTuanEffect
    api:
      url: '@query:LitemallPinTuanActivity__getPinTuanEffectiveness'
      data:
        startDate: "${dateRange[0] ? dateRange[0] | date : ''}"
        endDate: "${dateRange[1] ? dateRange[1] | date : ''}"
      sendOn: true
    body:
      - type: panel
        title: 拼团效果（全量拼团）
        body:
          - type: grid
            columns:
              - md: 3
                body:
                  - type: tpl
                    tpl: '开团数：<b>${openedGroups}</b>'
              - md: 3
                body:
                  - type: tpl
                    tpl: '成团数：<b>${successGroups}</b>'
              - md: 3
                body:
                  - type: tpl
                    tpl: '成团率：${openedGroups ? (successGroups / openedGroups * 100).toFixed(1) : 0}%'
              - md: 3
                body:
                  - type: tpl
                    tpl: '参与人数：${participantCount}，GMV：¥${totalGmv}'
          - type: alert
            level: info
            body: '秒杀按场次效果统计需 Order.flashSaleSessionId 关联列（ORM model-gap，待 ask-first 授权后补齐）。'
