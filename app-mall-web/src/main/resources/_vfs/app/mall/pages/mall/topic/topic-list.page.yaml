type: page
title: 专题列表
body:
  - type: wrapper
    className: storefront-header
    body:
      type: flex
      justify: space-between
      alignItems: center
      style:
        padding: 10px 20px
        backgroundColor: '#fff'
        borderBottom: 2px solid '#ff6700'
      items:
        - type: wrapper
          body:
            - type: button
              label: '<b style="font-size:24px;color:#ff6700">商城</b>'
              level: link
              actionType: link
              link: "/storefront-home"
        - type: wrapper
          body:
            - type: input-text
              name: searchKeyword
              placeholder: 搜索商品
              style:
                width: 300px
            - type: button
              label: 搜索
              level: primary
              actionType: link
              link: "/storefront-search?keyword=${searchKeyword}"
        - type: wrapper
          body:
            - type: button
              label: 购物车
              icon: shopping-cart
              level: link
              actionType: link
              link: "/storefront-cart"
            - type: button
              label: 用户中心
              icon: user
              level: link
              actionType: link
              link: "/storefront-user-center"

  - type: wrapper
    style:
      padding: 20px
    body:
      - type: tpl
        tpl: '<h3 style="color:#333;border-left:4px solid #ff6700;padding-left:8px;margin-bottom:15px">专题精选</h3>'
      - type: service
        name: topicList
        api:
          url: '@query:LitemallTopic__frontList'
          data:
            page: 1
            pageSize: 12
          sendOn: true
        body:
          type: each
          name: items
          placeholder: '<div style="padding:40px;text-align:center;color:#999">暂无专题</div>'
          items:
            type: card
            header:
              title: "${item.title}"
              avatar: "${item.picUrl}"
              description: "${item.subtitle}"
            body:
              type: wrapper
              body:
                - type: tpl
                  tpl: '<span style="color:#999;font-size:12px">阅读量：${item.readCount || 0}</span>'
                - type: button
                  label: 查看专题
                  level: primary
                  size: sm
                  actionType: link
                  link: "/storefront-topic-detail?id=${item.id}"
