
nop:
  debug: false
  auth:
    login:
      allow-create-default-user: false

    site-map:
      static-config-path: /app/mall/auth/app.action-auth.xml
      cache-timeout: 1s
      support-debug: false

    data-auth-config-path: /app/mall/auth/app.data-auth.xml

  web:
    validate-page-model: true

  orm:
    init-database-schema: false

    jwt:
      # WARNING: 生产部署必须设置环境变量 JWT_ENC_KEY
      enc-key: ${JWT_ENC_KEY}

  datasource:
    driver-class-name: org.h2.Driver
    jdbc-url: jdbc:h2:./db/test
    username: sa
    password:
   # driver-class-name: com.mysql.cj.jdbc.Driver
   # jdbc-url: jdbc:mysql://127.0.0.1:3306/litemall?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=UTC
   # username: nop
   # password: nop-test


  graphql:
    schema-introspection:
      enabled: false


# 开发模式配置
"%dev":
  nop:
    debug: true
    auth:
      login:
        allow-create-default-user: true
      site-map:
        support-debug: true
    datasource:
      driver-class-name: org.h2.Driver
      jdbc-url: jdbc:h2:./db/test
      username: sa
      password:

    web:
      validate-page-model: true

    orm:
      init-database-schema: true

      jwt:
        enc-key: ${JWT_ENC_KEY:57adcda2601e429f8422d37bfa07166e}

    graphql:
      schema-introspection:
        enabled: true


# devservices 会启用testcontainers来管理测试数据库
quarkus:
  devservices:
    enabled: false

  datasource:
    devservices:
      enabled: false

  http:
    host: 0.0.0.0
    cors: true

  log:
    level: INFO

    category:
      "io.nop":
        level: INFO
