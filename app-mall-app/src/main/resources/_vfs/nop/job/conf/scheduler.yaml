enabled: true
jobs:
  - jobName: cancel-expired-orders
    displayName: Cancel Expired Orders
    description: Auto-cancel unpaid orders past timeout
    trigger:
      repeatInterval: 900000
      repeatFixedDelay: true
      maxExecutionCount: 0
    invoker:
      bean: app.mall.service.scheduler.MallJobInvoker
      method: cancelExpiredOrders

  - jobName: confirm-expired-orders
    displayName: Confirm Expired Orders
    description: Auto-confirm shipped orders past timeout
    trigger:
      repeatInterval: 3600000
      repeatFixedDelay: true
      maxExecutionCount: 0
    invoker:
      bean: app.mall.service.scheduler.MallJobInvoker
      method: confirmExpiredOrders

  - jobName: cancel-expired-pickup-orders
    displayName: Cancel Expired Pickup Orders
    description: Auto-cancel and refund paid pickup orders past the pickup timeout (mall_pickup_timeout_days)
    trigger:
      repeatInterval: 3600000
      repeatFixedDelay: true
      maxExecutionCount: 0
    invoker:
      bean: app.mall.service.scheduler.MallJobInvoker
      method: cancelExpiredPickupOrders

  - jobName: expire-coupons
    displayName: Expire Coupons
    description: Mark unused coupons as expired
    trigger:
      repeatInterval: 3600000
      repeatFixedDelay: true
      maxExecutionCount: 0
    invoker:
      bean: app.mall.service.scheduler.MallJobInvoker
      method: expireCoupons

  - jobName: expire-groupons
    displayName: Expire Groupons
    description: Expire overdue groupon activities
    trigger:
      repeatInterval: 1800000
      repeatFixedDelay: true
      maxExecutionCount: 0
    invoker:
      bean: app.mall.service.scheduler.MallJobInvoker
      method: expireGroupons

  - jobName: expire-comment-window
    displayName: Expire Comment Window
    description: Close comment window for overdue order goods
    trigger:
      repeatInterval: 3600000
      repeatFixedDelay: true
      maxExecutionCount: 0
    invoker:
      bean: app.mall.service.scheduler.MallJobInvoker
      method: expireCommentWindow

  - jobName: switch-flash-sale-sessions
    displayName: Switch Flash Sale Sessions
    description: Flip flash sale sessionStatus 0/1/2 by sessionStart/sessionEnd time window
    trigger:
      repeatInterval: 60000
      repeatFixedDelay: true
      maxExecutionCount: 0
    invoker:
      bean: app.mall.service.scheduler.MallJobInvoker
      method: switchFlashSaleSessions

  - jobName: dispatch-birthday-coupons
    displayName: Dispatch Birthday Coupons
    description: Dispatch birthday gift coupons to users whose birthday matches today
    trigger:
      repeatInterval: 86400000
      repeatFixedDelay: true
      maxExecutionCount: 0
    invoker:
      bean: app.mall.service.scheduler.MallJobInvoker
      method: dispatchBirthdayCoupons

  - jobName: cancel-expired-exchange-orders
    displayName: Cancel Expired Combo Exchange Orders
    description: Auto-cancel combo (points+cash) exchange orders stuck in AWAITING_PAYMENT past timeout
    trigger:
      repeatInterval: 900000
      repeatFixedDelay: true
      maxExecutionCount: 0
    invoker:
      bean: app.mall.service.scheduler.MallJobInvoker
      method: cancelExpiredExchangeOrders

  - jobName: expire-points
    displayName: Expire Points Batches
    description: Decrement balance for points batches past their expireTime and write EXPIRE flow
    trigger:
      repeatInterval: 3600000
      repeatFixedDelay: true
      maxExecutionCount: 0
    invoker:
      bean: app.mall.service.scheduler.MallJobInvoker
      method: expirePoints

  - jobName: send-points-expiry-reminders
    displayName: Send Points Expiry Reminders
    description: Push a daily SYSTEM in-app message for each user with batches expiring within N days
    trigger:
      repeatInterval: 86400000
      repeatFixedDelay: true
      maxExecutionCount: 0
    invoker:
      bean: app.mall.service.scheduler.MallJobInvoker
      method: sendPointsExpiryReminders

  - jobName: send-coupon-expiry-reminders
    displayName: Send Coupon Expiry Reminders
    description: Push a daily MARKETING in-app message for each user with unused coupons expiring within N days
    trigger:
      repeatInterval: 86400000
      repeatFixedDelay: true
      maxExecutionCount: 0
    invoker:
      bean: app.mall.service.scheduler.MallJobInvoker
      method: sendCouponExpiryReminders

  - jobName: cleanup-expired-reset-codes
    displayName: Cleanup Expired Reset Codes
    description: Logically delete password reset code records past the retention window (mall_reset_code_retention_days, default 7)
    trigger:
      repeatInterval: 86400000
      repeatFixedDelay: true
      maxExecutionCount: 0
    invoker:
      bean: app.mall.service.scheduler.MallJobInvoker
      method: cleanupExpiredResetCodes
